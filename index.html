<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>NIBBLE v1.8.2</title>
    <style>
        :root { --glow: #00ff41; --bg: #050505; --label: #008f11; }
        body { background: var(--bg); color: var(--glow); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        #terminal { width: 92%; max-width: 400px; border: 2px solid var(--glow); padding: 20px; background: #000; box-sizing: border-box; }
        h2 { text-align: center; font-size: 1.3rem; margin-top: 0; letter-spacing: 4px; color: #fff; border-bottom: 1px solid var(--label); padding-bottom: 10px; }
        .hint { font-size: 0.8rem; color: var(--glow); font-weight: bold; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        textarea, input { width: 100%; background: #000; border: 1px solid var(--label); color: var(--glow); padding: 12px; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; font-size: 18px; outline: none; border-radius: 0; }
        textarea:focus, input:focus { border: 1px solid #fff; }
        button { background: var(--glow); color: black; border: none; padding: 18px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-size: 1rem; }
        .copy-btn { background: #111; color: #fff; border: 1px solid var(--label); padding: 8px 12px; font-size: 0.75rem; margin-top: -10px; margin-bottom: 15px; width: auto; display: inline-block; font-weight: bold; }
        .bait-display { display: flex; flex-direction: column; align-items: center; margin-top: 25px; padding-top: 15px; border-top: 1px solid #222; }
        .icons { font-size: 2.2rem; filter: brightness(1.8); letter-spacing: 15px; }
        .mode-toggle { display: flex; width: 100%; gap: 10px; margin-bottom: 20px; }
        .mode-toggle div { flex: 1; text-align: center; padding: 12px; border: 1px solid var(--label); cursor: pointer; font-size: 0.9rem; font-weight: bold; }
        .active-mode { background: var(--label); border-color: #fff !important; color: #fff; }
    </style>
</head>
<body>

<div id="terminal">
    <h2>NIBBLE v1.8.2</h2>
    
    <div class="mode-toggle">
        <div id="m-cast" class="active-mode" onclick="setMode('cast')">CAST</div>
        <div id="m-catch" onclick="setMode('catch')">CATCH</div>
    </div>

    <div class="hint">SECRET HOOK:</div>
    <input type="password" id="hook" autocomplete="off">
    
    <div class="hint">DATA STREAM:</div>
    <textarea id="dataStream" rows="4" spellcheck="false"></textarea>
    
    <div style="text-align: right;">
        <div class="copy-btn" onclick="copyData()">COPY DATA</div>
    </div>

    <button onclick="process()">NIBBLE DATA</button>

    <div class="bait-display">
        <div class="icons" id="baitIcons"></div>
    </div>
</div>

<script>
    let currentMode = 'cast';

    function setMode(m) {
        currentMode = m;
        document.getElementById('m-cast').className = m === 'cast' ? 'active-mode' : '';
        document.getElementById('m-catch').className = m === 'catch' ? 'active-mode' : '';
        document.getElementById('dataStream').value = '';
    }

    function getSalt() {
        const utcHour = new Date().getUTCHours();
        const salts = ['🐟','🐡','🐠','🦐','🐙','🦑','🦀','🐚','🐬','🐳','🐋','🦈'];
        return { 
            val: (utcHour + 5) * 3, 
            icons: [salts[utcHour % 12], salts[(utcHour + 1) % 12]]
        };
    }

    function rds(str) {
        let sum = 0;
        for (let i = 0; i < str.length; i++) sum += str.charCodeAt(i);
        return (sum % 100).toString().padStart(2, '0');
    }

    function copyData() {
        const ds = document.getElementById('dataStream');
        ds.select();
        ds.setSelectionRange(0, 99999); 
        navigator.clipboard.writeText(ds.value);
        const btn = document.querySelector('.copy-btn');
        btn.innerText = "COPIED";
        btn.style.borderColor = "#fff";
        setTimeout(() => { btn.innerText = "COPY DATA"; btn.style.borderColor = "var(--label)"; }, 2000);
    }

    function process() {
        const hook = document.getElementById('hook').value;
        const input = document.getElementById('dataStream').value.trim();
        const salt = getSalt();
        const saltVal = salt.val;

        if (!hook || !input) return;

        if (currentMode === 'cast') {
            let encoded = "";
            for (let i = 0; i < input.length; i++) {
                let charCode = input.charCodeAt(i) + saltVal + hook.length;
                let symbol = (i % 3 === 0) ? '!' : (i % 3 === 1) ? '@' : '#';
                encoded += symbol + charCode.toString(16);
            }
            const nibble = rds(encoded + hook + saltVal);
            document.getElementById('dataStream').value = nibble + encoded;
        } else {
            const providedNibble = input.substring(0, 2);
            const body = input.substring(2);
            const checkNibble = rds(body + hook + saltVal);

            if (providedNibble !== checkNibble) {
                document.getElementById('dataStream').value = "SIGNAL INTERFERENCE: INTEGRITY FAILURE";
                return;
            }

            try {
                let decoded = "";
                let parts = body.split(/[!@#]/).filter(x => x);
                parts.forEach(p => {
                    let charCode = parseInt(p, 16) - saltVal - hook.length;
                    decoded += String.fromCharCode(charCode);
                });
                document.getElementById('dataStream').value = decoded;
            } catch(e) {
                document.getElementById('dataStream').value = "SIGNAL LOSS: DATA CORRUPT";
            }
        }
    }

    function updateIcons() {
        document.getElementById('baitIcons').innerText = getSalt().icons.join(' ');
    }

    updateIcons();
    setInterval(updateIcons, 30000);
</script>

</body>
</html>
