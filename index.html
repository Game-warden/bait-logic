<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BaitLogic | Field Log</title>
    <style>
        :root { --forest: #33691E; --cream: #FFF8E7; --bark: #5D4037; --bg: #F9F9F7; --border: #D1C7A7; }
        
        body { 
            background: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; padding: 10px; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none; 
        }

        #terminal { 
            width: 100%; max-width: 380px; 
            background: var(--cream); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            padding: 28px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); 
            box-sizing: border-box; 
        }

        h2 { text-align: center; font-size: 1.7rem; margin-top: 0; margin-bottom: 24px; color: var(--bark); font-weight: 500; letter-spacing: -0.5px; }
        
        .mode-toggle { display: flex; width: 100%; gap: 10px; margin-bottom: 24px; }
        .mode-toggle div { flex: 1; text-align: center; padding: 12px; border-radius: 8px; border: 1.5px solid var(--forest); cursor: pointer; font-size: 0.9rem; font-weight: 600; color: var(--forest); transition: all 0.2s; }
        .active-mode { background: var(--forest) !important; color: var(--cream) !important; }

        .hint { font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: var(--bark); margin-left: 2px; }
        
        .stealth-input {
            width: 100%; background: #ffffff; border: 1px solid #D1D5DB; border-radius: 6px; color: var(--forest); padding: 12px; margin-bottom: 18px; box-sizing: border-box; font-family: inherit; font-size: 16px; outline: none;
            -webkit-text-security: disc; text-security: disc;
        }
        
        textarea { width: 100%; background: #ffffff; border: 1px solid #D1D5DB; border-radius: 6px; color: var(--forest); padding: 12px; margin-bottom: 8px; box-sizing: border-box; font-family: inherit; font-size: 16px; outline: none; resize: none; line-height: 1.4; }
        textarea:focus, .stealth-input:focus { border: 1.5px solid var(--forest); }
        
        .copy-btn { color: var(--forest); font-size: 0.75rem; font-weight: 600; text-decoration: underline; cursor: pointer; display: inline-block; }
        
        button { background: var(--forest); color: var(--cream); border: none; border-radius: 8px; padding: 18px; width: 100%; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 10px rgba(51, 105, 30, 0.15); }
        button:active { transform: scale(0.98); opacity: 0.9; }

        .bait-display { display: flex; flex-direction: column; align-items: center; margin-top: 32px; padding-top: 20px; border-top: 1px solid #EAE2D0; }
        .icons { font-size: 2.2rem; letter-spacing: 15px; margin-bottom: 8px; filter: sepia(0.3); }
        .version { font-size: 0.6rem; color: #B0A99A; letter-spacing: 1px; font-weight: 500; }

        .hp-ghost { position: absolute; top: -1000px; left: -1000px; opacity: 0; }
    </style>
</head>
<body>

<div class="hp-ghost"><input type="text" name="user"><input type="password" name="pass"></div>

<div id="terminal">
    <h2>BaitLogic</h2>
    
    <div class="mode-toggle">
        <div id="m-cast" class="active-mode" onclick="setMode('cast')">Cast</div>
        <div id="m-catch" onclick="setMode('catch')">Catch</div>
    </div>

    <div class="hint">Bait profile:</div>
    <input type="text" id="hid_190" class="stealth-input" spellcheck="false" autocomplete="new-password" placeholder="••••••••">
    
    <div class="hint">Data stream:</div>
    <textarea id="dataStream" rows="4" spellcheck="false" placeholder="Awaiting telemetry..."></textarea>
    
    <div style="text-align: right;">
        <div class="copy-btn" onclick="copyData()">Copy to clipboard</div>
    </div>

    <button onclick="process()">Run field logic</button>

    <div class="bait-display">
        <div class="icons" id="baitIcons"></div>
        <div class="version">BAITLOGIC ENGINE v1.9.2</div>
    </div>
</div>

<script>
    let currentMode = 'cast';

    function setMode(m) {
        currentMode = m;
        document.getElementById('m-cast').className = m === 'cast' ? 'active-mode' : '';
        document.getElementById('m-catch').className = m === 'catch' ? 'active-mode' : '';
        document.getElementById('dataStream').value = '';
    }

    function getSalt() {
        const utcHour = new Date().getUTCHours();
        const salts = ['🐟','🐡','🐠','🦐','🐙','🦑','🦀','🐚','🐬','🐳','🐋','🦈'];
        const speciesIndex = Math.floor(utcHour / 2);
        const nextIndex = (speciesIndex + 1) % 12;
        return { 
            val: (speciesIndex + 5) * 3, 
            icons: [salts[speciesIndex], salts[nextIndex]]
        };
    }

    function rds(str) {
        let sum = 0;
        for (let i = 0; i < str.length; i++) sum += str.charCodeAt(i);
        return (sum % 100).toString().padStart(2, '0');
    }

    async function copyData() {
        const ds = document.getElementById('dataStream');
        if (!ds.value) return;
        try {
            await navigator.clipboard.writeText(ds.value);
            const btn = document.querySelector('.copy-btn');
            btn.innerText = "✓ Copied";
            setTimeout(() => { btn.innerText = "Copy to clipboard"; }, 2000);
        } catch (err) {
            ds.select();
            document.execCommand('copy');
        }
    }

    function process() {
        const hook = document.getElementById('hid_190').value;
        const input = document.getElementById('dataStream').value.trim();
        const salt = getSalt();
        const saltVal = salt.val;

        if (!hook || !input) return;

        if (currentMode === 'cast') {
            let encoded = "";
            for (let i = 0; i < input.length; i++) {
                let charCode = input.charCodeAt(i) + saltVal + hook.length;
                let symbol = (i % 3 === 0) ? '!' : (i % 3 === 1) ? '@' : '#';
                encoded += symbol + charCode.toString(16);
            }
            const nibble = rds(encoded + hook + saltVal);
            document.getElementById('dataStream').value = nibble + encoded;
        } else {
            const providedNibble = input.substring(0, 2);
            const body = input.substring(2);
            const checkNibble = rds(body + hook + saltVal);

            if (providedNibble !== checkNibble) {
                document.getElementById('dataStream').value = "SIGNAL INTERFERENCE: INTEGRITY FAILURE";
                return;
            }

            try {
                let decoded = "";
                let parts = body.split(/[!@#]/).filter(x => x);
                parts.forEach(p => {
                    let charCode = parseInt(p, 16) - saltVal - hook.length;
                    decoded += String.fromCharCode(charCode);
                });
                document.getElementById('dataStream').value = decoded;
            } catch(e) {
                document.getElementById('dataStream').value = "SIGNAL LOSS: DATA CORRUPT";
            }
        }
    }

    function updateIcons() {
        document.getElementById('baitIcons').innerText = getSalt().icons.join(' ');
    }
    
    updateIcons();
    setInterval(updateIcons, 60000);
</script>

</body>
</html>
