<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>NIBBLE v1.8.0</title>
    <style>
        :root { --glow: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--glow); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        #terminal { width: 90%; max-width: 400px; border: 1px solid var(--glow); padding: 20px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); background: #000; }
        h2 { text-align: center; font-size: 1.1rem; margin-top: 0; letter-spacing: 3px; color: #fff; text-shadow: 0 0 5px var(--glow); }
        textarea, input { width: 100%; background: #0a0a0a; border: 1px solid #333; color: var(--glow); padding: 12px; margin: 10px 0; box-sizing: border-box; font-family: inherit; font-size: 16px; outline: none; border-radius: 0; }
        textarea:focus, input:focus { border-color: var(--glow); }
        button { background: var(--glow); color: black; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        button:active { background: #008f11; }
        .bait-display { display: flex; justify-content: center; gap: 20px; margin-top: 20px; font-size: 1.5rem; filter: grayscale(100%) brightness(1.5); }
        .mode-toggle { display: flex; width: 100%; gap: 5px; margin-bottom: 10px; }
        .mode-toggle div { flex: 1; text-align: center; padding: 10px; border: 1px solid #333; cursor: pointer; font-size: 0.75rem; letter-spacing: 1px; transition: 0.3s; }
        .active-mode { background: #111; border-color: var(--glow) !important; color: #fff; box-shadow: inset 0 0 5px var(--glow); }
        ::placeholder { color: #222; }
    </style>
</head>
<body>

<div id="terminal">
    <h2>NIBBLE // v1.8.0</h2>
    
    <div class="mode-toggle">
        <div id="m-cast" class="active-mode" onclick="setMode('cast')">CAST MODE</div>
        <div id="m-catch" onclick="setMode('catch')">CATCH MODE</div>
    </div>

    <input type="password" id="hook" placeholder="SHARED HOOK" autocomplete="off">
    <textarea id="dataStream" rows="4" placeholder="DATA STREAM / PACKET INJECT" spellcheck="false"></textarea>
    
    <button onclick="process()">RUN NIBBLE DATA</button>

    <div class="bait-display" id="baitIcons"></div>
</div>

<script>
    let currentMode = 'cast';

    function setMode(m) {
        currentMode = m;
        document.getElementById('m-cast').className = m === 'cast' ? 'active-mode' : '';
        document.getElementById('m-catch').className = m === 'catch' ? 'active-mode' : '';
        document.getElementById('dataStream').value = '';
    }

    function getSalt() {
        const utcHour = new Date().getUTCHours();
        const salts = ['🐟','🐡','🐠','🦐','🐙','🦑','🦀','🐚','🐬','🐳','🐋','🦈'];
        // Generates a deterministic salt based on the UTC hour
        return { 
            val: (utcHour + 5) * 3, 
            icons: [salts[utcHour % 12], salts[(utcHour + 1) % 12]] 
        };
    }

    function rds(str) {
        let sum = 0;
        for (let i = 0; i < str.length; i++) sum += str.charCodeAt(i);
        // Returns a 2-digit checksum (00-99)
        return (sum % 100).toString().padStart(2, '0');
    }

    function process() {
        const hook = document.getElementById('hook').value;
        const input = document.getElementById('dataStream').value.trim();
        const salt = getSalt();
        const saltVal = salt.val;

        if (!hook || !input) return;

        if (currentMode === 'cast') {
            let encoded = "";
            for (let i = 0; i < input.length; i++) {
                let charCode = input.charCodeAt(i) + saltVal + hook.length;
                let symbol = (i % 3 === 0) ? '!' : (i % 3 === 1) ? '@' : '#';
                encoded += symbol + charCode.toString(16);
            }
            const nibble = rds(encoded + hook + saltVal);
            document.getElementById('dataStream').value = nibble + encoded;
        } else {
            // Check for the 2-digit Nibble
            const providedNibble = input.substring(0, 2);
            const body = input.substring(2);
            const checkNibble = rds(body + hook + saltVal);

            if (providedNibble !== checkNibble) {
                document.getElementById('dataStream').value = "SIGNAL INTERFERENCE: INTEGRITY FAILURE";
                return;
            }

            try {
                let decoded = "";
                let parts = body.split(/[!@#]/).filter(x => x);
                parts.forEach(p => {
                    let charCode = parseInt(p, 16) - saltVal - hook.length;
                    decoded += String.fromCharCode(charCode);
                });
                document.getElementById('dataStream').value = decoded;
            } catch(e) {
                document.getElementById('dataStream').value = "SIGNAL LOSS: DATA CORRUPT";
            }
        }
    }

    function updateIcons() {
        document.getElementById('baitIcons').innerText = getSalt().icons.join(' ');
    }

    // Initialize
    updateIcons();
    setInterval(updateIcons, 60000);
</script>

</body>
</html>
