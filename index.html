<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIBBLE v1.7.7</title>
    <style>
        :root { --cyan: #22d3ee; --neon: #00ff41; --bg: #050505; --panel: #161616; --text: #ececec; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .app-container { max-width: 440px; margin: 0 auto; display: flex; flex-direction: column; min-height: 94vh; }
        
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .logo { font-weight: 900; font-size: 28px; letter-spacing: -1.5px; color: var(--cyan); line-height: 1; }
        .version { font-size: 10px; color: #333; letter-spacing: 1px; }

        .toggle-container { display: flex; background: #111; border-radius: 14px; padding: 4px; margin-bottom: 25px; border: 1px solid #222; }
        .toggle-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #444; border-radius: 10px; font-weight: 700; font-size: 12px; cursor: pointer; text-transform: uppercase; }
        .toggle-btn.active { background: #222; color: var(--cyan); }

        .field-group { margin-bottom: 22px; }
        label { display: block; font-size: 9px; text-transform: uppercase; color: #555; margin-bottom: 8px; font-weight: 800; letter-spacing: 1px; }
        .field-note { font-size: 9px; color: #444; margin-top: 6px; letter-spacing: 0.3px; line-height: 1.2; }
        
        input, textarea { width: 100%; padding: 16px; background: #000; border: 1px solid #222; color: #fff; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--cyan); background: #050505; }

        .main-btn { width: 100%; padding: 18px; background: var(--cyan); color: #000; border: none; font-weight: 900; border-radius: 12px; cursor: pointer; text-transform: uppercase; margin-top: 10px; font-size: 14px; letter-spacing: 1px; }
        
        .output-card { background: var(--panel); border: 1px solid #222; border-radius: 16px; padding: 20px; margin-top: 30px; position: relative; overflow: hidden; }
        .copy-btn { position: absolute; top: 0; right: 0; font-size: 9px; color: var(--cyan); background: #1a1a1a; padding: 12px 18px; border-left: 1px solid #222; border-bottom: 1px solid #222; font-weight: 900; cursor: pointer; z-index: 10; letter-spacing: 1px; }
        .out-text { font-family: "SF Mono", "Fira Code", monospace; font-size: 14px; color: var(--neon); word-break: break-all; min-height: 65px; padding-top: 15px; line-height: 1.5; transition: 0.3s; }
        
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; padding-top: 15px; border-top: 1px solid #222; font-size: 10px; }
        .nibble-tag { color: #444; font-weight: 700; letter-spacing: 1px; }
        .nibble-val { color: var(--cyan); font-weight: 900; font-size: 16px; font-family: monospace; }
        
        .bait-tray-container { margin-top: auto; text-align: center; padding: 20px 0; }
        .bait-controls { display: flex; align-items: center; justify-content: center; gap: 20px; }
        .step-btn { background: transparent; border: 1px solid #111; color: #333; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .step-btn:active { border-color: var(--cyan); color: var(--cyan); }
        .bait-display { font-size: 16px; filter: grayscale(100%); opacity: 0.4; letter-spacing: 4px; transition: 0.3s; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo">NIBBLE</div>
        <div class="version">V1.7.7 ELITE</div>
    </div>

    <div class="toggle-container">
        <button id="btnEnc" class="toggle-btn active" onclick="setMode('encode')">CAST</button>
        <button id="btnDec" class="toggle-btn" onclick="setMode('decode')">CATCH</button>
    </div>

    <div class="field-group">
        <label>Shared Hook</label>
        <input type="password" id="mKey" placeholder="Formula..." autocomplete="off">
        <div class="field-note">**DO:** Use unique phrases. **DON'T:** Leave empty or use common words.</div>
    </div>

    <div class="field-group">
        <label>Data Stream</label>
        <textarea id="mainIn" rows="4" placeholder="Message content..."></textarea>
        <div class="field-note">**DO:** Be concise. **DON'T:** Include real names or identifiable locations.</div>
    </div>

    <input type="hidden" id="salt" value="0">

    <button class="main-btn" onclick="runProcess()">Nibble Data</button>

    <div class="output-card">
        <div class="copy-btn" onclick="copyText()" id="copyLabel">COPY</div>
        <div class="out-text" id="outText">WAITING FOR CAST...</div>
        
        <div class="status-bar">
            <span class="nibble-tag">VERIFICATION NIBBLE</span>
            <span class="nibble-val" id="authDigit">-</span>
        </div>
    </div>

    <div class="bait-tray-container">
        <label style="margin-bottom: 12px; opacity: 0.3; font-size: 8px;">Live Bait (Salt Adjust)</label>
        <div class="bait-controls">
            <button class="step-btn" onclick="adjBait(-1)">–</button>
            <div class="bait-display" id="bait-display"></div>
            <button class="step-btn" onclick="adjBait(1)">+</button>
        </div>
    </div>
</div>

<script>
const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const PRE = ["!", "@", "#"];
let currentMode = 'encode';
let currentSalt = new Date().getUTCHours();

function updateBaitUI() {
    document.getElementById('salt').value = currentSalt;
    const big = Math.floor(currentSalt / 5);
    const small = currentSalt % 5;
    document.getElementById('bait-display').innerHTML = "🦈".repeat(big) + "🐟".repeat(small);
    document.getElementById('bait-display').style.opacity = "0.8";
    setTimeout(() => { document.getElementById('bait-display').style.opacity = "0.4"; }, 300);
}

function adjBait(n) {
    currentSalt = (currentSalt + n + 24) % 24;
    updateBaitUI();
}

function setMode(m) {
    currentMode = m;
    document.getElementById('btnEnc').className = 'toggle-btn' + (m === 'encode' ? ' active' : '');
    document.getElementById('btnDec').className = 'toggle-btn' + (m === 'decode' ? ' active' : '');
    document.getElementById('mainIn').value = "";
    document.getElementById('outText').style.color = "var(--neon)";
    document.getElementById('outText').innerText = m === 'encode' ? "WAITING FOR CAST..." : "WAITING FOR CATCH...";
    document.getElementById('authDigit').innerText = "-";
}

function getShiftedAlpha(key, salt) {
    let sum = 0;
    const combined = (key + salt.toString()).toUpperCase().replace(/[^A-Z0-9]/g, '');
    for(let i=0; i<combined.length; i++) {
        let val = ALPHABET.indexOf(combined[i]);
        sum += (val === -1 ? parseInt(combined[i]) || 0 : val + 1);
    }
    let shift = sum % 26;
    return ALPHABET.substring(shift) + ALPHABET.substring(0, shift);
}

function nibbleMath(s) {
    let curr = s.toString().replace(/[^0-9]/g, '');
    while (curr.length > 1) {
        let sum = 0;
        for(let char of curr) sum += parseInt(char);
        curr = sum.toString();
    }
    return curr || "0";
}

function runProcess() {
    const input = document.getElementById('mainIn').value.trim();
    const key = document.getElementById('mKey').value;
    const salt = document.getElementById('salt').value;

    if(!key) {
        alert("CRITICAL: Shared Hook required for secure cast.");
        return;
    }
    
    const shiftedAlpha = getShiftedAlpha(key, salt);
    if(!input) return;

    if (currentMode === 'encode') {
        let un = "";
        input.split(/\s+/).forEach(word => {
            let clean = word.toUpperCase().replace(/[^A-Z0-9]/g, '');
            if(!clean) return;
            let res = "0"; 
            for(let c of clean) {
                if(/[0-9]/.test(c)) res += "*" + c;
                else {
                    let idx = shiftedAlpha.indexOf(c);
                    let t = Math.floor(idx / 9);
                    let v = (idx % 9) + 1;
                    res += PRE[t] + v;
                }
            }
            un += res + " ";
        });
        document.getElementById('outText').innerText = un.trim();
        document.getElementById('authDigit').innerText = nibbleMath(key.toUpperCase() + salt + input.toUpperCase());
    } else {
        let dec = "";
        input.split(/\s+/).forEach(code => {
            let word = ""; let i = 1;
            while(i < code.length) {
                let p = code[i]; let v = code[i+1];
                if(p === "*") { word += v; i+=2; }
                else {
                    let tIdx = PRE.indexOf(p);
                    let cIdx = (tIdx * 9) + (parseInt(v) - 1);
                    word += (shiftedAlpha[cIdx] || ''); i += 2;
                }
            }
            dec += word + " ";
        });
        document.getElementById('outText').innerText = dec.trim();
        document.getElementById('authDigit').innerText = nibbleMath(key.toUpperCase() + salt + dec.trim().toUpperCase());
    }
}

function copyText() {
    const text = document.getElementById('outText').innerText;
    if(text.includes("WAITING") || text.includes("ACTION")) return;
    
    navigator.clipboard.writeText(text);
    const label = document.getElementById('copyLabel');
    const statusText = document.getElementById('outText');
    
    label.innerText = "COPIED";
    
    const originalText = statusText.innerText;
    statusText.style.color = "#666";
    statusText.innerText = "ACTION: Transmit via secure channel. Relay the Nibble separately. Clear app state after send.";
    
    setTimeout(() => { 
        label.innerText = "COPY"; 
        statusText.style.color = "var(--neon)";
        statusText.innerText = originalText;
    }, 4500);
}

window.onload = updateBaitUI;
</script>
</body>
</html>
